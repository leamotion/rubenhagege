<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="font-family:var(--font-body)"></div>
<script type="text/babel">
const { ProductCard, ProductGridCard } = window.RubenHagGeDesignSystem_76f306;
function Demo(){
  return <div style={{display:'flex',flexDirection:'column'}}>
    <div style={{background:'var(--surface-inverse)',padding:'20px 24px'}}>

    <div style={{background:'var(--surface-page)',padding:'24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <ProductGridCard image="../../assets/photography/fraisier-fruits-rouges.jpg" name="Fraisier fruits rouges" price="À partir de 33,00 €" badge="Édition Octobre"/>

    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
