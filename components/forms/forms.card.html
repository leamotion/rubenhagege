<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<div id="root" style="background:var(--surface-page);padding:24px;font-family:var(--font-body)"></div>
<script type="text/babel">
const { Input, Select, Textarea, QuantityStepper, Checkbox, RadioGroup } = window.RubenHagGeDesignSystem_76f306;
function Demo(){
  const [qty,setQty]=React.useState(2);
  const [msg,setMsg]=React.useState('Joyeux anniversaire !');
  const [mode,setMode]=React.useState('pickup');
  const [checked,setChecked]=React.useState(true);
  return <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Input label="Prénom" placeholder="Prénom" />
      <Select label="Nombre de parts" value="6" onChange={()=>{}} options={[{label:'4 parts',value:'4'},{label:'6 parts',value:'6'},{label:'8 parts',value:'8'}]}/>
      <Textarea label="Message sur la plaque" value={msg} onChange={setMsg} />
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <QuantityStepper value={qty} onChange={setQty}/>
        <Checkbox label="Ajouter une plaque" checked={checked} onChange={setChecked}/>
      </div>
    </div>
    <RadioGroup value={mode} onChange={setMode} options={[
      {label:'Click & Collect', value:'pickup', helper:'Retrait au laboratoire'},
      {label:'Livraison', value:'delivery', helper:"Vendredi, jusqu'à jeudi 18h"},
    ]}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
