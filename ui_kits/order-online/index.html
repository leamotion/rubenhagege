<!-- @dsCard group="Order Online" viewport="430x760" name="Ordering Site" subtitle="Home, catalogue, personalization, checkout" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ruben Hagège — Commander</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../../_ds_bundle.js"></script>
<script src="dates.js"></script>
<style>*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:#e8e2d8;font-family:'Inter',sans-serif}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="DateSelect.jsx"></script>
<script type="text/babel" src="Catalog.jsx"></script>
<script type="text/babel" src="ProductSheetOnly.jsx"></script>
<script type="text/babel" src="Checkout.jsx"></script>
<script type="text/babel">
function App() {
  const [view, setView] = React.useState('home');
  const [date, setDate] = React.useState(null);
  const [sheetProduct, setSheetProduct] = React.useState(null);
  const [sheetShareable, setSheetShareable] = React.useState(false);
  const [cart, setCart] = React.useState([]);
  const [toast, setToast] = React.useState(null);
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  function showToast(name) {
    setToast(name);
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => setToast(null), 1600);
  }
  function quickAdd(p) {
    setCart((c) => [...c, { ...p, qty: 1, parts: null, plaque: null }]);
    showToast(p.name);
  }
  function addFromSheet(p, opts) {
    setCart((c) => [...c, { ...p, ...opts }]);
    showToast(p.name);
    setSheetProduct(null);
  }

  return (
    <div style={{ width: '100%', maxWidth: 480, minHeight: '100vh', margin: '0 auto', background: 'var(--surface-page)', position: 'relative' }}>
      {view === 'home' && (
        <Home onOrder={() => setView('date')} />
      )}
      {view === 'date' && (
        <DateSelect date={date} onSelect={setDate} onBack={() => setView('home')} onNext={() => setView('catalog')} />
      )}
      {view === 'catalog' && (
        <Catalog
          date={date}
          cartCount={cartCount}
          onBack={() => setView('date')}
          onCart={() => setView('checkout')}
          onOpenProduct={(p, cat) => { setSheetProduct(p); setSheetShareable(cat === 'partager'); }}
          onQuickAdd={quickAdd}
        />
      )}
      {view === 'checkout' && (
        <Checkout cart={cart} date={date} onBack={() => setView('catalog')} onConfirm={() => setView('confirmation')} />
      )}
      {view === 'confirmation' && (
        <Confirmation onRestart={() => { setCart([]); setDate(null); setView('home'); }} />
      )}

      {view === 'catalog' && cartCount > 0 && (
        <button onClick={() => setView('checkout')} style={{
          position: 'absolute', left: 20, right: 20, bottom: 20, zIndex: 30,
          background: 'var(--surface-inverse)', color: '#fff', border: 'none', borderRadius: 999,
          padding: '16px 20px', fontFamily: 'var(--font-body)', fontWeight: 600, fontSize: 15,
          display: 'flex', justifyContent: 'space-between', cursor: 'pointer', boxShadow: 'var(--shadow-lg)',
        }}>
          <span>Voir le panier ({cartCount})</span><span>→</span>
        </button>
      )}

      <ProductSheet product={sheetProduct} shareable={sheetShareable} onClose={() => setSheetProduct(null)} onAdd={addFromSheet} />

      {toast && (
        <div style={{
          position: 'absolute', left: '50%', bottom: 92, transform: 'translateX(-50%)', zIndex: 50,
          background: 'var(--surface-inverse)', color: '#fff', padding: '10px 18px', borderRadius: 999,
          fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 600, boxShadow: 'var(--shadow-lg)', whiteSpace: 'nowrap',
        }}>{toast} ajouté</div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
